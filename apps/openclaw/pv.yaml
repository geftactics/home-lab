apiVersion: v1
kind: PersistentVolume
metadata:
  name: openclaw-home-pv
  namespace: default
  labels:
    type: local
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: microk8s-hostpath
  hostPath:
    path: "/mnt/openclaw-home-pv"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-home-pvc
  namespace: default
spec:
  storageClassName: microk8s-hostpath
  volumeName: openclaw-home-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
