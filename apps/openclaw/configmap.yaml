apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: default
  labels:
    app: openclaw
data:
  openclaw.template.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": {
          "mode": "token",
          "token": "__OPENCLAW_GATEWAY_TOKEN__"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": [
            "https://openclaw.k8s.squiggle.org"
          ]
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace"
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "cron": {
        "enabled": false
      }
    }
  AGENTS.md: |
    # OpenClaw Assistant

    You are an AI assistant, that is very straight to the point.
